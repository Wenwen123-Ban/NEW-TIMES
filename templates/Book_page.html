<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LBAS Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/Book_page.css') }}" />
</head>
<body>
  <header class="books-header">
    <h1>Book Catalog</h1>
    <p>Browse books publicly. Reserving requires verified School ID.</p>
  </header>

  <main class="container py-4">
    <section class="toolbar mb-3">
      <input id="catalogSearchInput" class="form-control" placeholder="Search title, author, or book #" />
      <div id="catalogResultCount" class="result-count">0 results</div>
    </section>
    <div id="catalogCategoryPills" class="category-pills mb-3"></div>
    <div id="catalogBookGrid" class="catalog-grid"></div>
  </main>

  <button id="idLoginFab" class="btn btn-primary fab" type="button">Verify ID</button>
  <div id="toast" class="books-toast"></div>

  <div id="idLoginModal" class="overlay" aria-hidden="true">
    <article class="modal-card">
      <h4>Verify School ID</h4>
      <input id="userSchoolId" class="form-control my-3" placeholder="School ID" />
      <button id="verifyIdBtn" class="btn btn-primary w-100 mb-2">Verify</button>
      <button class="btn btn-outline-secondary w-100" data-close="idLoginModal">Cancel</button>
    </article>
  </div>

  <div id="bookReserveModal" class="overlay" aria-hidden="true">
    <article class="modal-card reserve-card">
      <button class="btn-close float-end" data-close="bookReserveModal"></button>
      <h4 id="modalBookTitle">-</h4>
      <p id="modalBookAuthor" class="text-muted">-</p>
      <div class="d-flex gap-2 mb-2"><span id="modalBookNo" class="badge text-bg-dark"></span><span id="modalBookCategory" class="badge text-bg-secondary"></span></div>

      <label class="form-label small">School ID</label>
      <input id="reserveSchoolId" class="form-control mb-2" readonly />
      <label class="form-label small">Pickup Date</label>
      <input id="reservePickupDate" type="date" class="form-control mb-2" />
      <label class="form-label small">Pickup Time</label>
      <input id="reservePickupTime" type="time" class="form-control mb-2" />
      <label class="form-label small">Contact Type</label>
      <select id="reserveContactType" class="form-select mb-2"><option value="phone">Phone</option><option value="email">Email</option></select>
      <label class="form-label small">Contact Value</label>
      <input id="reserveContactValue" class="form-control" placeholder="09XXXXXXXXX" />
      <button id="reserveSubmitBtn" class="btn btn-primary w-100 mt-3">Confirm Reservation</button>
    </article>
  </div>

  <script src="{{ url_for('static', filename='js/Book_page.js') }}"></script>
</body>
</html>
